<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>217 Boston Road · Build Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --border:#e4e4e7; --muted:#71717a; --ink:#09090b; --sub:#3f3f46; --bg:#f8fafc; --radius:6px; }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0c1220; font-family:'Inter',system-ui,sans-serif; overflow:hidden; height:100vh; }

  #header {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(255,255,255,.97); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    padding:0 1.5rem; height:48px; display:flex; align-items:center; gap:.75rem;
  }
  #header a { font-size:.75rem; color:var(--muted); text-decoration:none; font-weight:500; }
  #header a:hover { color:var(--ink); }
  .sep { color:var(--border); }
  #header h2 { font-size:.875rem; font-weight:600; color:var(--ink); letter-spacing:-.01em; }

  #controls {
    position:fixed; top:60px; right:14px; z-index:100;
    background:rgba(255,255,255,.97); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:var(--radius);
    padding:.875rem; width:178px; display:flex; flex-direction:column; gap:.75rem;
  }
  .ctrl-section { display:flex; flex-direction:column; gap:.3rem; }
  .ctrl-label {
    font-size:.6rem; font-weight:600; letter-spacing:.09em;
    text-transform:uppercase; color:var(--muted); margin-bottom:2px;
  }
  .ctrl-btn {
    display:flex; align-items:center; gap:.5rem;
    font-family:'Inter',sans-serif; font-size:.75rem; font-weight:500;
    color:var(--sub); background:none; border:1px solid var(--border);
    border-radius:4px; padding:.3rem .55rem; cursor:pointer;
    transition:all .1s; text-align:left; width:100%;
  }
  .ctrl-btn:hover { background:var(--bg); }
  .ctrl-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }

  #timeline {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    background:rgba(255,255,255,.97); backdrop-filter:blur(8px);
    border-top:1px solid var(--border); padding:.75rem 1.5rem;
    display:flex; align-items:center; gap:.875rem;
  }
  .tl-label {
    font-size:.62rem; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted); white-space:nowrap; flex-shrink:0;
  }
  #phase-btns { display:flex; gap:.375rem; flex:1; }
  .ph-btn {
    flex:1; font-family:'Inter',sans-serif; font-size:.65rem; font-weight:600;
    padding:.4rem .35rem; border-radius:4px; border:none; cursor:pointer;
    transition:all .12s; text-align:center; color:#fff; line-height:1.35;
    opacity:.32; letter-spacing:-.005em;
  }
  .ph-btn:hover { opacity:.65; }
  .ph-btn.built { opacity:.55; }
  .ph-btn.active { opacity:1; transform:translateY(-2px); box-shadow:0 3px 10px rgba(0,0,0,.25); }

  #hint {
    position:fixed; bottom:70px; right:14px; z-index:100;
    font-size:.65rem; color:rgba(255,255,255,.22);
    font-family:'Inter',sans-serif; text-align:right; line-height:1.7;
  }
  #cv { display:block; }
</style>
</head>
<body>

<div id="header">
  <a href="index.html">← Build Plan</a>
  <span class="sep">/</span>
  <h2>217 Boston Road · Build Tracker</h2>
</div>

<div id="controls">
  <div class="ctrl-section">
    <div class="ctrl-label">Floor</div>
    <button class="ctrl-btn active" onclick="setFloor('all',this)">All floors</button>
    <button class="ctrl-btn" onclick="setFloor('gf',this)">Ground floor</button>
    <button class="ctrl-btn" onclick="setFloor('ff',this)">First floor</button>
    <button class="ctrl-btn" onclick="setFloor('loft',this)">Loft</button>
  </div>
  <div class="ctrl-section">
    <div class="ctrl-label">View mode</div>
    <button class="ctrl-btn active" id="btn-cumul" onclick="setMode('cumulative',this)">Cumulative build</button>
    <button class="ctrl-btn" id="btn-iso" onclick="setMode('isolate',this)">Phase only</button>
  </div>
  <div class="ctrl-section">
    <div class="ctrl-label">Display</div>
    <button class="ctrl-btn active" id="btn-roof" onclick="toggleLayer('roof',this)">Roof visible</button>
    <button class="ctrl-btn active" id="btn-mep" onclick="toggleLayer('mep',this)">MEP visible</button>
  </div>
</div>

<div id="hint">Orbit: drag &nbsp;·&nbsp; Zoom: scroll &nbsp;·&nbsp; Pan: right-drag</div>
<canvas id="cv"></canvas>

<div id="timeline">
  <div class="tl-label">Phase</div>
  <div id="phase-btns"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
// ─── PHASES ──────────────────────────────────────────────────────────────────
const PHASES = [
  { id:0, label:'Mobilisation',   color:'#dc2626' },
  { id:1, label:'Demo & Strip',   color:'#b91c1c' },
  { id:2, label:'Structural',     color:'#1d4ed8' },
  { id:3, label:'External Shell', color:'#047857' },
  { id:4, label:'First Fix MEP',  color:'#b45309' },
  { id:5, label:'Partitions',     color:'#6d28d9' },
  { id:6, label:'Second Fix',     color:'#065f46' },
];

let currentPhase = 0;
let viewMode = 'cumulative';
let currentFloor = 'all';
const layerOn = { roof: true, mep: true };

const phaseBtnsEl = document.getElementById('phase-btns');
PHASES.forEach(p => {
  const b = document.createElement('button');
  b.className = 'ph-btn' + (p.id === 0 ? ' active' : '');
  b.style.background = p.color;
  b.id = 'ph' + p.id;
  b.innerHTML = `Ph ${p.id}<br><span style="font-weight:400;font-size:.6rem;opacity:.85">${p.label}</span>`;
  b.onclick = () => selectPhase(p.id);
  phaseBtnsEl.appendChild(b);
});

// ─── DIMENSIONS ──────────────────────────────────────────────────────────────
const HW  = 4.775;
const HD  = 4.775;
const T   = 0.28;
const TI  = 0.105;
const GFH = 2.991;
const FFH = 3.150;
const LF  = GFH + FFH;       // 6.141
const EAV = LF  + 1.20;      // 7.341
const RDG = EAV + 2.166;     // 9.507
const DHW = 3.88;
const DD  = 2.979;
const DH  = 2.086;
const extW = 4.5, extD = 3.0, extH = 2.6;
const extX = -HW + extW / 2;
const extZ = HD  + extD / 2;
const dorCZ = HD - DD / 2;
const dorTY = LF + DH;
const DZF   = HD - DD;

// ─── ENGINE / SCENE ───────────────────────────────────────────────────────────
const canvas = document.getElementById('cv');
canvas.width  = innerWidth;
canvas.height = innerHeight;
const engine = new BABYLON.Engine(canvas, true);
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.047, 0.071, 0.125, 1);

// Camera
const cam = new BABYLON.ArcRotateCamera('cam', -0.82, 1.02, 30,
  new BABYLON.Vector3(0, 4, 0), scene);
cam.attachControl(canvas, true);
cam.lowerRadiusLimit = 5;
cam.upperRadiusLimit = 60;
cam.wheelPrecision = 25;
cam.panningSensibility = 60;

// Lighting
const amb = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
amb.intensity = 0.55;
amb.groundColor = new BABYLON.Color3(0.08, 0.12, 0.18);

const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.55,-1.1,-0.3), scene);
sun.intensity = 1.15;
sun.position  = new BABYLON.Vector3(16, 28, 10);

const sg = new BABYLON.ShadowGenerator(1024, sun);
sg.useBlurExponentialShadowMap = true;

// Ground
const gnd = BABYLON.MeshBuilder.CreateGround('gnd', { width:90, height:90 }, scene);
const gndMat = new BABYLON.StandardMaterial('gndM', scene);
gndMat.diffuseColor  = new BABYLON.Color3(0.038, 0.072, 0.12);
gndMat.specularColor = BABYLON.Color3.Black();
gnd.material = gndMat;
gnd.receiveShadows = true;

// Grid
(function() {
  const col = new BABYLON.Color3(0.075, 0.13, 0.21);
  for (let i = -25; i <= 25; i += 2.5) {
    const h = BABYLON.MeshBuilder.CreateLines('gh', {
      points: [new BABYLON.Vector3(-25, 0.004, i), new BABYLON.Vector3(25, 0.004, i)]
    }, scene);
    h.color = col;
    const v = BABYLON.MeshBuilder.CreateLines('gv', {
      points: [new BABYLON.Vector3(i, 0.004, -25), new BABYLON.Vector3(i, 0.004, 25)]
    }, scene);
    v.color = col;
  }
})();

// ─── MATERIALS ───────────────────────────────────────────────────────────────
function mat(name, hex, alpha) {
  const m = new BABYLON.StandardMaterial(name, scene);
  m.diffuseColor  = BABYLON.Color3.FromHexString(hex.length === 7 ? hex : '#' + hex);
  m.specularColor = new BABYLON.Color3(0.04, 0.04, 0.04);
  if (alpha !== undefined && alpha < 1) { m.alpha = alpha; m.backFaceCulling = false; }
  return m;
}

const M = {
  existing : mat('exist',  '#8ca0b4', 0.80),
  slab     : mat('slab',   '#4b5e72', 0.92),
  roof     : mat('roof',   '#253347', 0.92),
  roofOld  : mat('roofOld','#1c2a3a', 0.85),
  glass    : mat('glass',  '#93c5fd', 0.38),
  frame    : mat('frame',  '#b0bccf', 0.92),
  steel    : mat('steel',  '#bfdbfe', 0.95),
  joist    : mat('joist',  '#92400e', 0.90),
  brick    : mat('brick',  '#8ca0b4', 0.88),
  part     : mat('part',   '#c4b5fd', 0.65),
  pipe     : mat('pipe',   '#22d3ee', 0.85),
  elec     : mat('elec',   '#fbbf24', 0.85),
  fitout   : mat('fitout', '#6ee7b7', 0.85),
};
M.glass.backFaceCulling = false;

const phaseMats = PHASES.map(p => {
  const m = mat('ph'+p.id, p.color, 0.90);
  m.backFaceCulling = false;
  return m;
});

// ─── REGISTRY ────────────────────────────────────────────────────────────────
const registry = [];

function reg(mesh, phase, floor, opts) {
  opts = opts || {};
  mesh.receiveShadows = true;
  if (!opts.noShadow) sg.addShadowCaster(mesh, true);
  registry.push({
    mesh,
    phase,
    floor : floor || 'all',
    isRoof: !!opts.isRoof,
    isMep : !!opts.isMep,
    builtMat: opts.builtMat || M.existing,
    removeAt: opts.removeAt,
  });
}

// ─── GEOMETRY HELPERS ─────────────────────────────────────────────────────────
function box(name, w, h, d, x, y, z, material, phase, floor, opts) {
  const m = BABYLON.MeshBuilder.CreateBox(name, { width:w, height:h, depth:d }, scene);
  m.position = new BABYLON.Vector3(x, y, z);
  m.material = material;
  reg(m, phase, floor, opts);
  return m;
}

function wallPanel(name, x1, z1, x2, z2, yBase, h, t, material, phase, floor, opts) {
  const lenX = Math.abs(x2 - x1), lenZ = Math.abs(z2 - z1);
  const w = lenX > 0.01 ? lenX : t;
  const d = lenZ > 0.01 ? lenZ : t;
  return box(name, w, h, d, (x1+x2)/2, yBase + h/2, (z1+z2)/2, material, phase, floor, opts);
}

function triMesh(name, positions, indices, material, phase, floor, opts) {
  const m = new BABYLON.Mesh(name, scene);
  const vd = new BABYLON.VertexData();
  vd.positions = positions;
  vd.indices   = indices;
  const normals = [];
  BABYLON.VertexData.ComputeNormals(positions, indices, normals);
  vd.normals = normals;
  vd.applyToMesh(m);
  m.material = material;
  m.material.backFaceCulling = false;
  reg(m, phase, floor, opts);
  return m;
}

function cyl(name, x, yBot, yTop, z, r, material, phase, floor, opts) {
  const h = yTop - yBot;
  const m = BABYLON.MeshBuilder.CreateCylinder(name, { height:h, diameter:r*2, tessellation:8 }, scene);
  m.position = new BABYLON.Vector3(x, yBot + h/2, z);
  m.material = material;
  reg(m, phase, floor, opts);
  return m;
}

// ─── EXISTING STRUCTURE (phase -1) ───────────────────────────────────────────
function extWalls(yBase, h, floor) {
  const o = { builtMat: M.existing };
  wallPanel('fw'+floor, -HW, -HD, HW,  -HD, yBase, h, T, M.existing, -1, floor, o);
  wallPanel('rw'+floor, -HW,  HD, HW,   HD, yBase, h, T, M.existing, -1, floor, o);
  wallPanel('lw'+floor, -HW, -HD, -HW,  HD, yBase, h, T, M.existing, -1, floor, o);
  wallPanel('pw'+floor,  HW, -HD,  HW,  HD, yBase, h, T, M.existing, -1, floor, o);
}

function slab(yBase, floor) {
  box('sl'+floor, HW*2, 0.12, HD*2, 0, yBase+0.06, 0, M.slab, -1, floor, { builtMat:M.slab });
}

slab(0,   'gf'); extWalls(0,   GFH, 'gf');
slab(GFH, 'ff'); extWalls(GFH, FFH, 'ff');
slab(LF,  'lo'); extWalls(LF,  1.2, 'lo');

// Rear kitchen extension
box('ext',    extW, extH, extD, extX, extH/2,    extZ, M.existing, -1, 'gf', {builtMat:M.existing});
box('extRf',  extW+0.04, 0.12, extD+0.04, extX, extH+0.06, extZ, M.roof, -1, 'gf', {builtMat:M.roof, isRoof:true});

// Chimney stacks — existing, removed during phase 1
box('chim1', 0.9, 2.4, 0.9, -2.8, RDG-0.5, -HD+0.45, M.existing, -1, 'lo', {builtMat:M.existing, removeAt:2});
box('chim2', 0.9, 2.4, 0.9,  2.4, RDG-0.5,  HD-0.45, M.existing, -1, 'lo', {builtMat:M.existing, removeAt:2});

// Existing pitched roof (removed / replaced in phase 3)
const roOpts = { builtMat:M.roofOld, isRoof:true, removeAt:3 };
triMesh('rfF', [-HW,EAV,-HD, HW,EAV,-HD, HW,RDG,0, -HW,RDG,0], [0,2,1, 0,3,2], M.roofOld, -1, 'lo', roOpts);
triMesh('rfR', [-HW,RDG,0, HW,RDG,0, HW,EAV,HD, -HW,EAV,HD], [0,1,2, 0,2,3], M.roofOld, -1, 'lo', roOpts);
[-HW, HW].forEach((x,i) => {
  triMesh('rfG'+i, [x,LF,-HD, x,EAV,-HD, x,RDG,0, x,EAV,HD, x,LF,HD], [0,1,2, 0,2,3, 0,3,4], M.roofOld, -1, 'lo', roOpts);
});

// ─── PHASE 1 — DEMO (chimney breast, soft strip highlights) ──────────────────
// Chimney breast GF dining room
box('cb', 1.1, GFH*0.5, 0.5, -2.0, GFH*0.25, HD-0.25, M.existing, 1, 'gf', {builtMat:M.existing});

// ─── PHASE 2 — STRUCTURAL STEELWORK ──────────────────────────────────────────
const sOpts = { builtMat: M.steel };
// Three primary beams spanning the width at loft floor level
[-1.8, 0, 1.8].forEach((z, i) => {
  box('bm'+i, HW*2-0.1, 0.254, 0.152, 0, LF+0.127, z, M.steel, 2, 'lo', sOpts);
});
// Spreader plates in walls
[[-HW+0.14,-1.8],[HW-0.14,-1.8],[-HW+0.14,0],[HW-0.14,0],[-HW+0.14,1.8],[HW-0.14,1.8]].forEach(([x,z],i) => {
  box('sp'+i, 0.08, 0.04, 0.45, x, LF+0.22, z, M.steel, 2, 'lo', sOpts);
});
// New structural loft floor joists
for (let z = -HD+0.4; z < HD-0.3; z += 0.4) {
  box('j'+z.toFixed(1), HW*2-0.32, 0.197, 0.05, 0, LF+0.30, z, M.joist, 2, 'lo',
    { builtMat:M.joist, noShadow:true });
}

// ─── PHASE 3 — EXTERNAL SHELL ────────────────────────────────────────────────
// Raised gable wall (right flank, from knee wall top to ridge)
wallPanel('rgw', HW, -HD*0.9, HW, HD*0.9, LF+1.2, RDG-(LF+1.2)-0.25, T, M.brick, 3, 'lo',
  { builtMat:M.brick });

// Box dormer body (rear)
box('dor', DHW*2, DH, DD, 0, LF+DH/2, dorCZ, M.brick, 3, 'lo', {builtMat:M.brick});
// Dormer flat roof
box('dorRf', DHW*2+0.08, 0.12, DD+0.08, 0, dorTY+0.06, dorCZ, M.roof, 3, 'lo',
  { builtMat:M.roof, isRoof:true });

// New pitched roof (replaces existing)
const nrOpts = { builtMat:M.roof, isRoof:true };
triMesh('nrF', [-HW,EAV,-HD, HW,EAV,-HD, HW,RDG,0, -HW,RDG,0], [0,2,1, 0,3,2], M.roof, 3, 'lo', nrOpts);
// Rear flanks (outside dormer)
triMesh('nrRL', [-HW,RDG,0, -DHW,RDG,0, -DHW,EAV,HD, -HW,EAV,HD], [0,1,2, 0,2,3], M.roof, 3, 'lo', nrOpts);
triMesh('nrRR', [ DHW,RDG,0,  HW,RDG,0,  HW,EAV,HD,  DHW,EAV,HD], [0,1,2, 0,2,3], M.roof, 3, 'lo', nrOpts);
// Central rear slope above dormer
triMesh('nrRC', [-DHW,RDG,0, DHW,RDG,0, DHW,dorTY,DZF, -DHW,dorTY,DZF], [0,1,2, 0,2,3], M.roof, 3, 'lo', nrOpts);
// New gable ends
[-HW, HW].forEach((x,i) => {
  triMesh('nrG'+i, [x,LF,-HD, x,EAV,-HD, x,RDG,0, x,EAV,HD, x,LF,HD],
    [0,1,2, 0,2,3, 0,3,4], M.roof, 3, 'lo', nrOpts);
});

// Velux — 3× front pitched roof
const pAng = Math.atan2(RDG-EAV, HD);
const tP = 0.38;
const vZ = -HD + HD*tP, vY = EAV + (RDG-EAV)*tP;
[-2.8, 0, 2.8].forEach((vx, i) => {
  const v = BABYLON.MeshBuilder.CreateBox('vx'+i, { width:0.78, height:0.07, depth:1.18 }, scene);
  v.position = new BABYLON.Vector3(vx, vY, vZ);
  v.rotation.x = -pAng;
  v.material = M.glass;
  reg(v, 3, 'lo', { builtMat:M.glass, isRoof:true });
});

// Flat rooflight in dormer flat roof
box('rfl', 0.9, 0.09, 0.9, -1.2, dorTY+0.06, dorCZ, M.glass, 3, 'lo', {builtMat:M.glass, isRoof:true});

// Dormer glazing — Juliette door (left) + 2× rear windows
const rZ = HD + 0.03;
box('jul', 1.5, 2.1, 0.06, -2.7, LF+1.05+0.05, rZ, M.glass, 3, 'lo', {builtMat:M.glass});
[0.55, 2.25].forEach((wx,i) => {
  box('dw'+i, 1.2, 1.2, 0.06, wx, LF+0.9+0.6, rZ, M.glass, 3, 'lo', {builtMat:M.glass});
});
// Gable end window (raised right gable)
box('gew', 0.07, 1.5, 1.5, HW, RDG-0.88, 0, M.glass, 3, 'lo', {builtMat:M.glass});

// 2× Kitchen Velux (GF extension flat roof)
[-0.65, 0.65].forEach((dx,i) => {
  box('kv'+i, 0.78, 0.09, 1.0, extX+dx, extH+0.07, extZ-0.55, M.glass, 3, 'gf', {builtMat:M.glass, isRoof:true});
});

// ─── PHASE 4 — FIRST FIX MEP ─────────────────────────────────────────────────
const mOpts = { builtMat:M.pipe, isMep:true, noShadow:true };
// Soil stack — left-rear corner, full height
cyl('stk', -HW+0.15, -0.6, RDG+0.4, HD-0.25, 0.04, M.pipe, 4, 'all', mOpts);
// Unvented cylinder (FF, left-front)
cyl('uvc', -HW+0.55, GFH, GFH+1.1, -HD+1.3, 0.28, M.pipe, 4, 'ff', mOpts);
// Boiler (in extension, rear)
box('boil', 0.45, 0.55, 0.25, extX, extH-0.95, HD+extD-0.2, M.pipe, 4, 'gf', mOpts);
// Consumer unit
box('cu', 0.38, 0.28, 0.10, HW-0.15, 1.4, -HD+0.8, M.elec, 4, 'gf', {builtMat:M.elec, isMep:true, noShadow:true});

// ─── PHASE 5 — PARTITIONS ────────────────────────────────────────────────────
const pOpts = { builtMat:M.part };
// Lounge | Bed5 divider (approx centre-line x=0)
wallPanel('pLB', 0, HD-0.1, 0, HD-DD, LF, DH, TI, M.part, 5, 'lo', pOpts);
// Bathroom front wall (left side)
wallPanel('pBF', -DHW, HD-DD, -1.3, HD-DD, LF, DH, TI, M.part, 5, 'lo', pOpts);
// WC front wall (right side)
wallPanel('pWF', 1.3, HD-DD, DHW, HD-DD, LF, DH, TI, M.part, 5, 'lo', pOpts);
// Hall front wall (centre)
wallPanel('pHF', -1.3, HD-DD, 1.3, HD-DD, LF, DH*0.55, TI, M.part, 5, 'lo', pOpts);
// Bathroom side wall
wallPanel('pBS', -1.3, HD-DD, -1.3, HD-0.12, LF, DH, TI, M.part, 5, 'lo', pOpts);
// WC side wall
wallPanel('pWS', 1.3, HD-DD, 1.3, HD-0.12, LF, DH, TI, M.part, 5, 'lo', pOpts);

// ─── PHASE 6 — SECOND FIX ────────────────────────────────────────────────────
const fOpts = { builtMat:M.fitout, noShadow:true };
// Loft bathroom fitout
box('bath', 1.7, 0.56, 0.75, -2.5, LF+0.28, HD-1.7, M.fitout, 6, 'lo', fOpts);
box('basin', 0.55, 0.85, 0.45, -2.5, LF+0.42, HD-0.45, M.fitout, 6, 'lo', fOpts);
cyl('wcpan', 3.0, LF, LF+0.42, HD-1.4, 0.22, M.fitout, 6, 'lo', fOpts);
// FF bathroom walk-in shower
box('shwr', 0.9, FFH*0.6, 0.9, HW-0.6, GFH+FFH*0.3, HD-0.6, M.fitout, 6, 'ff', fOpts);
// Fire doors (loft stair)
box('fd1', 0.07, 2.0, 0.85, 0, LF+1.0, HD-DD+0.05, M.fitout, 6, 'lo', fOpts);

// ─── VISIBILITY ENGINE ────────────────────────────────────────────────────────
function applyVis() {
  registry.forEach(entry => {
    const { mesh, phase, floor, isRoof, isMep, builtMat, removeAt } = entry;

    // Hard filters
    if (currentFloor !== 'all' && floor !== 'all' && floor !== currentFloor) {
      mesh.isVisible = false; return;
    }
    if (isRoof && !layerOn.roof)  { mesh.isVisible = false; return; }
    if (isMep  && !layerOn.mep)   { mesh.isVisible = false; return; }

    // Existing items with removal phases
    if (removeAt !== undefined && currentPhase >= removeAt) {
      mesh.isVisible = false; return;
    }

    // Existing structure (phase -1) — always visible unless removed
    if (phase === -1) {
      mesh.isVisible = true;
      mesh.material  = M.existing;
      return;
    }

    if (viewMode === 'cumulative') {
      if (phase > currentPhase) {
        mesh.isVisible = false;
      } else if (phase === currentPhase) {
        mesh.isVisible = true;
        mesh.material  = phaseMats[phase];
      } else {
        mesh.isVisible = true;
        mesh.material  = builtMat;
      }
    } else {
      mesh.isVisible = (phase === currentPhase);
      if (mesh.isVisible) mesh.material = phaseMats[phase];
    }
  });

  // Update buttons
  PHASES.forEach(p => {
    const b = document.getElementById('ph'+p.id);
    b.classList.remove('active','built');
    if (p.id === currentPhase) b.classList.add('active');
    else if (p.id < currentPhase) b.classList.add('built');
  });
}

window.selectPhase = id => { currentPhase = id; applyVis(); };

window.setFloor = (floor, btn) => {
  currentFloor = floor;
  document.querySelectorAll('#controls .ctrl-section:first-child .ctrl-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyVis();
};

window.setMode = (mode, btn) => {
  viewMode = mode;
  document.querySelectorAll('#controls .ctrl-section:nth-child(2) .ctrl-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyVis();
};

window.toggleLayer = (layer, btn) => {
  layerOn[layer] = !layerOn[layer];
  btn.classList.toggle('active', layerOn[layer]);
  btn.textContent = layerOn[layer]
    ? (layer === 'roof' ? 'Roof visible' : 'MEP visible')
    : (layer === 'roof' ? 'Roof hidden'  : 'MEP hidden');
  applyVis();
};

applyVis();

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
engine.runRenderLoop(() => scene.render());
window.addEventListener('resize', () => {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
  engine.resize();
});
</script>
